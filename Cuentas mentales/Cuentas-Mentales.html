<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧪 Laboratorio Matemático — ¡Módulo de Cálculo Mental!</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- CORREGIDO: "container" en vez de "contenedor" -->
    <div class="container">
        <!-- Encabezado de Informe Estilo Laboratorio -->
        <!-- CORREGIDO: "lab-header" y "subtitle" -->
        <div class="lab-header">
            <h1>🧠 Cuentas mentales</h1>
            <p class="subtitle">Módulo de Análisis Analítico de Secuencias Rápidas</p>
        </div>
        
        <!-- Panel de Control / Parámetros del Experimento -->
        <!-- CORREGIDO: "controls-panel" en vez de "card" -->
        <section class="controls-panel">
            <!-- CORREGIDO: "section-title" -->
            <h3 class="section-title">Parámetros del Experimento</h3>
            
            <div class="control-group">
                <!-- Cambiado: Ahora muestra "Nivel" en lugar de "ms" -->
                <label for="speed">Frecuencia de Muestreo: Nivel <span id="speedLabel" class="telemetry">3</span></label>
                <!-- Cambiado: min="1", max="5", value="3", step="1" -->
                <input type="range" id="speed" min="1" max="5" value="3" step="1" oninput="updateSpeedLabel()">
            </div>
            
            <div class="control-group">
                <label for="amount">Muestra de Elementos: <span id="amountLabel" class="telemetry">5</span> unidades</label>
                <input type="range" id="amount" min="5" max="10" value="5" oninput="updateAmountLabel()">
            </div>
            
            <div class="control-group">
                <label for="topRange">Umbral Superior (Rango): <span id="topRangeLabel" class="telemetry">15</span></label>
                <input type="range" id="topRange" min="10" max="20" value="15" oninput="updateTopRangeLabel()">
            </div>

            <!-- CORREGIDO: Clases unificadas a ".btn .btn-success" -->
            <button class="btn btn-success" style="width: 100%;" onclick="startGame()">▶ Iniciar Secuencia</button>
        </section>
        
        <!-- Zona de Ejecución del Experimento -->
        <!-- CORREGIDO: "lab-card" en vez de "card" -->
        <main class="lab-card">
            <div id="operations" class="display-monitoreo">—</div>
            
            <div class="interaction-zone">
                <input type="text" id="answer" placeholder="Esperando datos analíticos..." autocomplete="off">
                <!-- Aseguramos las clases exactas para el círculo perfecto -->
                <button class="btn btn-action round-btn" onclick="checkResult()" aria-label="Validar resultado">&#8594;</button>
            </div>
            
            <!-- CORREGIDO: "action-triggers" para que use la envoltura flex del CSS -->
            <div class="action-triggers">
                <!-- CORREGIDO: Clases unificadas a ".btn .btn-danger" -->
                <button class="btn btn-danger" onclick="stopGame()">🛑 Detener Secuencia</button>
            </div>
        </main>
        
        <!-- Bitácora de Resultados -->
        <!-- CORREGIDO: "lab-log" en vez de "mensaje" -->
        <div id="result" class="lab-log" style="display: none;"></div>

        <audio id="sound" src="bip.mp3"></audio>
        <audio id="soundCorrect" src="correcto.mp3"></audio>
        <audio id="soundIncorrect" src="incorrecto.mp3"></audio>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
