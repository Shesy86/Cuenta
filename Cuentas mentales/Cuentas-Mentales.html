<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo Mental - Bitácora de Laboratorio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="lab-header">
            <h1>MÓDULO DE CÁLCULO MENTAL</h1>
            <p class="subtitle">Análisis analítico de secuencias numéricas rápidas.</p>
        </header>
        
        <section class="lab-card controls-panel">
            <h3 class="section-title">Parámetros del Experimento</h3>
            
            <div class="control-group">
                <label for="speed">Frecuencia de Muestreo: <span id="speedLabel" class="telemetry">1000</span> ms</label>
                <input type="range" id="speed" min="500" max="5000" value="1000" step="500" oninput="updateSpeedLabel()">
            </div>
            
            <div class="control-group">
                <label for="amount">Muestra de Elementos: <span id="amountLabel" class="telemetry">5</span> unidades</label>
                <input type="range" id="amount" min="5" max="10" value="5" oninput="updateAmountLabel()">
            </div>
            
            <div class="control-group">
                <label for="topRange">Umbral Superior (Rango): <span id="topRangeLabel" class="telemetry">15</span></label>
                <input type="range" id="topRange" min="10" max="20" value="15" oninput="updateTopRangeLabel()">
            </div>
        </section>
        
        <main class="lab-card game-panel">
            <div id="operations" class="display-monitoreo">—</div>
            
            <div class="interaction-zone">
                <input type="text" id="answer" placeholder="Esperando datos..." autocomplete="off">
                <button class="btn btn-action" onclick="checkResult()" aria-label="Validar resultado">&#8594;</button>
            </div>
            
            <div class="action-triggers">
                <button class="btn btn-success" onclick="startGame()">Iniciar Secuencia</button>
                <button class="btn btn-danger" onclick="stopGame()">Abortar Secuencia</button>
            </div>
        </main>
        
        <div id="result" class="lab-log"></div>

        <audio id="sound" src="bip.mp3"></audio>
        <audio id="soundCorrect" src="correcto.mp3"></audio>
        <audio id="soundIncorrect" src="incorrecto.mp3"></audio>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
