<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧪 Laboratorio Matemático — ¡Módulo de Cálculo Mental!</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="contenedor">
        <!-- Encabezado de Informe Estilo Laboratorio -->
        <div class="cabecera">
            <h1>🧠 Cuentas mentales</h1>
            <p>Módulo de Análisis Analítico de Secuencias Rápidas</p>
        </div>
        
        <!-- Panel de Control / Parámetros del Experimento -->
        <section class="card">
            <h3 class="seccion-label">Parámetros del Experimento</h3>
            
            <div class="control-group">
                <label for="speed">Frecuencia de Muestreo: <span id="speedLabel" class="telemetry">1000</span> ms</label>
                <input type="range" id="speed" min="500" max="5000" value="1000" step="500" oninput="updateSpeedLabel()">
            </div>
            
            <div class="control-group">
                <label for="amount">Muestra de Elementos: <span id="amountLabel" class="telemetry">5</span> unidades</label>
                <input type="range" id="amount" min="5" max="10" value="5" oninput="updateAmountLabel()">
            </div>
            
            <div class="control-group">
                <label for="topRange">Umbral Superior (Rango): <span id="topRangeLabel" class="telemetry">15</span></label>
                <input type="range" id="topRange" min="10" max="20" value="15" oninput="updateTopRangeLabel()">
            </div>

            <!-- Botón de Inicio reordenado arriba -->
            <button class="btn-primario" onclick="startGame()">▶ Iniciar Secuencia</button>
        </section>
        
        <!-- Zona de Ejecución del Experimento -->
        <main class="card">
            <div id="operations" class="display-monitoreo">—</div>
            
            <div class="interaction-zone">
                <input type="text" id="answer" placeholder="Esperando datos analíticos..." autocomplete="off">
                <!-- Botón de verificación perfectamente redondo -->
                <button class="round-btn btn-verificar" onclick="checkResult()" aria-label="Validar resultado">&#8594;</button>
            </div>
            
            <div class="area-acciones-juego">
                <!-- Botón de detener cambiado de texto -->
                <button class="btn-danger-custom" onclick="stopGame()">🛑 Detener Secuencia</button>
            </div>
        </main>
        
        <!-- Bitácora de Resultados -->
        <div id="result" class="mensaje"></div>

        <audio id="sound" src="bip.mp3"></audio>
        <audio id="soundCorrect" src="correcto.mp3"></audio>
        <audio id="soundIncorrect" src="incorrecto.mp3"></audio>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
